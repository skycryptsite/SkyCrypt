name: Checks

on:
  workflow_call:

jobs:
  formatting-checks:
    name: Linting, Formatting, Svelte Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: PNPM Install
        uses: ./.github/actions/pnpm-install

      - name: Make dummy env for types
        run: mv .env.example .env

      - name: Run checks
        run: pnpm lint

  tests:
    uses: ./.github/workflows/test.yml
